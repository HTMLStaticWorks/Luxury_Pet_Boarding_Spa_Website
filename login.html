    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Paws Ritz</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Home</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="index.html">Home 1</a></li>
                            <li><a class="dropdown-item" href="home-2.html">Home 2</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="suites.html">Suites</a></li>
                    <li class="nav-item ms-lg-3"><button id="themeToggle" class="theme-toggle-btn">◑</button></li>
                    <li class="nav-item ms-lg-2"><a class="nav-link active" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="btn btn-primary-luxury ms-lg-2" href="signup.html">Sign Up</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="auth-wrapper">
        <div class="container">
            <div class="auth-card luxury-card fade-in">
                <div class="text-center mb-4">
                    <h2 class="mb-2">Welcome Back</h2>
                    <p class="text-secondary-themed">Login to manage your bookings</p>
                </div>
                <form>
                    <div class="mb-4">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control-luxury" placeholder="Enter your email">
                    </div>
                    <div class="mb-4">
                        <label class="form-label d-flex justify-content-between">
                            Password
                            <a href="#" class="text-accent text-decoration-none" style="font-size: 0.9em;">Forgot?</a>
                        </label>
                        <input type="password" class="form-control-luxury" placeholder="Enter your password">
                    </div>
                    <button type="button" class="btn btn-primary-luxury w-100 py-3 mb-4">Sign In</button>
                </form>
                <p class="text-center text-secondary-themed mb-0">Don't have an account? <a href="signup.html" class="text-accent fw-bold text-decoration-none">Create one</a></p>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
