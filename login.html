<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Luxury Pet Boarding & Spa</title><link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!-- Navbar Removed -->
    <div class="auth-wrapper">
        <div class="container">
            <div class="auth-card luxury-card fade-in">
                <div class="text-center mb-4">
                    <a class="auth-brand" href="index.html"><img src="assets/img/favicon.svg" alt="Logo" height="28" class="me-2">Paws Ritz</a>
                    <h2 class="mb-2">Welcome Back</h2>
                    <p class="text-secondary-themed">Login to manage your bookings</p>
                </div>
                <form>
                    <div class="mb-4">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control-luxury" placeholder="Enter your email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control-luxury" placeholder="Enter your password">
                    </div>
                    <div class="mb-4 d-flex justify-content-between align-items-center">
                        <label class="form-check-luxury">
                            <input type="checkbox">
                            <span class="text-secondary-themed" style="font-size: 0.9em;">Remember Me</span>
                        </label>
                        <a href="#" class="text-accent text-decoration-none" style="font-size: 0.9em;">Forgot?</a>
                    </div>
                    <button type="button" class="btn btn-primary-luxury w-100 py-3 mb-4">Sign In</button>

                    <div class="auth-divider">OR</div>

                    <div class="social-btns">
                        <a href="#" class="btn-social btn-google">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="22px" height="22px">
                                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                            </svg>
                        </a>
                        <a href="#" class="btn-social btn-facebook"><i class="fab fa-facebook-f"></i></a>
                    </div>
                </form>
                <p class="text-center text-secondary-themed mb-0">Don't have an account? <a href="signup.html"
                        class="text-accent fw-bold text-decoration-none">Create one</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
