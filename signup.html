<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Luxury Pet Boarding & Spa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!-- Navbar Removed -->
    <div class="auth-wrapper">
        <div class="container">
            <div class="auth-card luxury-card fade-in">
                <div class="text-center mb-4">
                    <a class="auth-brand" href="index.html">Paws Ritz</a>
                    <h2 class="mb-2">Create Account</h2>
                    <p class="text-secondary-themed">Join our exclusive pet club</p>
                </div>
                <form>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control-luxury">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control-luxury">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control-luxury">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control-luxury">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Pet's Name (Optional)</label>
                        <input type="text" class="form-control-luxury">
                    </div>
                    <div class="mb-4">
                        <label class="form-check-luxury">
                            <input type="checkbox">
                            <span class="text-secondary-themed" style="font-size: 0.9em;">I agree to the <a href="#"
                                    class="text-accent underline">Terms & Conditions</a></span>
                        </label>
                    </div>
                    <button type="button" class="btn btn-primary-luxury w-100 py-3 mb-4">Register</button>

                    <div class="auth-divider">OR</div>

                    <div class="social-btns">
                        <a href="#" class="btn-social btn-google"><i class="fab fa-google"></i></a>
                        <a href="#" class="btn-social btn-facebook"><i class="fab fa-facebook-f"></i></a>
                    </div>
                </form>
                <p class="text-center text-secondary-themed mb-0">Already have an account? <a href="login.html"
                        class="text-accent fw-bold text-decoration-none">Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
